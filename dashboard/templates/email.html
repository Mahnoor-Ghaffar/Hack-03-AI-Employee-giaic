<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email - AI Employee Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-robot"></i> AI Employee</h1>
                <span class="tier-badge platinum">Platinum Tier</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/tasks" class="nav-item">
                    <i class="fas fa-tasks"></i>
                    <span>Tasks</span>
                </a>
                <a href="/approvals" class="nav-item">
                    <i class="fas fa-check-circle"></i>
                    <span>Approvals</span>
                </a>
                <a href="/email" class="nav-item active">
                    <i class="fas fa-envelope"></i>
                    <span>Email</span>
                </a>
                <a href="/social" class="nav-item">
                    <i class="fas fa-share-alt"></i>
                    <span>Social Media</span>
                </a>
                <a href="/accounting" class="nav-item">
                    <i class="fas fa-chart-line"></i>
                    <span>Accounting</span>
                </a>
                <a href="/health" class="nav-item">
                    <i class="fas fa-heartbeat"></i>
                    <span>Health</span>
                </a>
                <a href="/briefings" class="nav-item">
                    <i class="fas fa-file-alt"></i>
                    <span>Briefings</span>
                </a>
                <a href="/settings" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot" id="system-status"></span>
                    <span id="status-text">Checking...</span>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2>Email Triage</h2>
                <div class="top-bar-actions">
                    <button class="btn-refresh" onclick="loadEmails()" title="Refresh">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>
            
            <div class="content-wrapper">
                <div class="email-page">
                    <!-- Email List -->
                    <div class="email-list-container">
                        <div id="email-list">
                            <div class="loading">Loading emails...</div>
                        </div>
                    </div>
                    
                    <!-- Email Detail Modal -->
                    <div id="email-modal" class="modal">
                        <div class="modal-content large">
                            <div class="modal-header">
                                <h3 id="modal-email-title">Email Details</h3>
                                <button class="modal-close" onclick="closeEmailModal()">&times;</button>
                            </div>
                            <div class="modal-body">
                                <div id="modal-email-content">
                                    <!-- Email content will be loaded here -->
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-secondary" onclick="closeEmailModal()">Close</button>
                                <button class="btn btn-primary" onclick="forwardEmail()">
                                    <i class="fas fa-share"></i> Forward
                                </button>
                                <button class="btn btn-success" onclick="archiveEmail()">
                                    <i class="fas fa-archive"></i> Archive
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="{{ url_for('static', filename='js/email.js') }}"></script>
</body>
</html>
