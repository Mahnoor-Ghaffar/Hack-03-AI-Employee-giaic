# Odoo Configuration File
# This file is mounted to /etc/odoo/odoo.conf in the container

[options]
# Admin password for database management
admin_passwd = YourSecureAdminPassword123!

# Database connection
db_host = postgres
db_port = 5432
db_user = odoo
db_password = YourSecureDBPassword123!
db_name = odoo_db

# Server configuration
http_port = 8069
http_interface = 0.0.0.0

# Workers configuration (for production)
# workers = 2
# max_memory_limit = 2048

# Logging
logfile = /var/log/odoo/odoo.log
log_level = info

# Data directory
data_dir = /var/lib/odoo

# Additional addons directories
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

# Security
list_db = False

# Email configuration (outgoing mail server)
# smtp_server = smtp.gmail.com
# smtp_port = 587
# smtp_user = your_email@gmail.com
# smtp_password = your_app_password
# smtp_encryption = starttls
