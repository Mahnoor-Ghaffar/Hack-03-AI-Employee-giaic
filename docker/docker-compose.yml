services:
  # Odoo Community Edition 17
  odoo:
    image: odoo:17
    container_name: odoo_community
    ports:
      - "8069:8069"
    environment:
      - HOST=postgres
      - USER=${ODOO_DB_USER:-odoo}
      - PASSWORD=${ODOO_DB_PASSWORD:-odoo}
      - PORT=5432
      - DB_NAME=${ODOO_DB_NAME:-odoo_db}
    volumes:
      - odoo-data:/var/lib/odoo
      - ./odoo/config:/etc/odoo
      - ./odoo/addons:/mnt/extra-addons
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - odoo_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: odoo_postgres
    environment:
      - POSTGRES_PASSWORD=${ODOO_DB_PASSWORD:-odoo}
      - POSTGRES_USER=${ODOO_DB_USER:-odoo}
      - POSTGRES_DB=${ODOO_DB_NAME:-odoo_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - odoo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ODOO_DB_USER:-odoo} -d ${ODOO_DB_NAME:-odoo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgAdmin for database management (optional, comment out if not needed)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: odoo_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@example.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin_password}
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    ports:
      - "8080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - odoo_network
    profiles:
      - tools

networks:
  odoo_network:
    driver: bridge

volumes:
  odoo-data:
    driver: local
  postgres-data:
    driver: local
  pgadmin-data:
    driver: local
